<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Infinity AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Inter;
}

body {
    height: 100vh;
    display: flex;
    color: white;

    /* ?? Relaxing background */
    background: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1600&q=80")
    no-repeat center center/cover;

    overflow: hidden;
}

/* ?? Overlay */
body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.55);
    z-index: 0;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-right: 1px solid rgba(255,255,255,0.08);
    z-index: 1;
}

.logo {
    font-size: 20px;
    font-weight: 700;
    color: #a78bfa;
    margin-bottom: 20px;
}

.newchat {
    padding: 10px;
    background: #1e293b;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 20px;
}

.newchat:hover {
    background: #334155;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    z-index: 1;
}

/* CHAT */
.chat {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.msg {
    max-width: 70%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 12px;
    line-height: 1.4;
    animation: fadeIn 0.2s ease-in;
}

.user {
    background: linear-gradient(135deg, #6366f1, #a855f7);
    margin-left: auto;
}

.ai {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
}

/* INPUT */
.inputbar {
    display: flex;
    padding: 15px;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.08);
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #1e293b;
    color: white;
}

button {
    margin-left: 10px;
    padding: 14px 18px;
    border: none;
    border-radius: 10px;
    background: #7c3aed;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #5b21b6;
}

/* animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">?? Infinity AI</div>
    <div class="newchat">+ New Chat</div>
    <p style="font-size:12px;color:gray;">
        Your smart AI assistant
    </p>
</div>

<!-- MAIN -->
<div class="main">

    <div class="chat">

        {% for c in chat %}
            <div class="msg user">You: {{ c.user }}</div>
            <div class="msg ai">{{ c.ai }}</div>
        {% endfor %}

    </div>

    <form method="POST" class="inputbar">
        <input name="message" placeholder="Ask Infinity AI..." required>
        <button>Send</button>
    </form>

</div>

</body>
</html>
